<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Scanner v9.5</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root{
      --rw-red:#D20014;
      --rw-darkred:#9F000F;
      --rw-teal:#208684;
      --rw-gray:#656565;
      --bg:#f4f6f8;
      --card:#ffffff;
      --border:#d9dee5;
      --text:#1f2937;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:20px;
    }

    .container{
      max-width:900px;
      margin:0 auto;
    }

    h1{
      margin:0 0 6px;
      color:var(--rw-red);
      font-size:28px;
    }

    .sub{
      color:var(--rw-gray);
      margin-bottom:20px;
    }

    .panel{
      background:var(--card);
      border-radius:14px;
      padding:16px;
      box-shadow:0 6px 20px rgba(0,0,0,0.06);
      margin-bottom:18px;
    }

    #reader{
      width:100%;
      max-width:520px;
      margin:0 auto;
      overflow:hidden;
      border-radius:12px;
    }

    .btnrow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    button{
      border:0;
      border-radius:10px;
      padding:11px 16px;
      font-weight:700;
      cursor:pointer;
      font-size:14px;
    }

    .primary{
      background:var(--rw-red);
      color:white;
    }

    .secondary{
      background:#e9eef3;
      color:#111827;
    }

    .status{
      margin-top:12px;
      font-weight:700;
      color:var(--rw-teal);
    }

    .result-wrap{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .field-box{
      background:#fff;
      border-left:6px solid var(--rw-red);
      border-radius:12px;
      padding:14px 16px;
      box-shadow:0 4px 14px rgba(0,0,0,0.05);
    }

    .field-title{
      font-size:13px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.4px;
      color:var(--rw-gray);
      margin-bottom:6px;
    }

    .field-value{
      font-size:18px;
      font-weight:700;
      color:#111827;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .group-box{
      background:#fff;
      border-left:6px solid var(--rw-teal);
      border-radius:12px;
      padding:14px 16px;
      box-shadow:0 4px 14px rgba(0,0,0,0.05);
    }

    .group-title{
      font-size:15px;
      font-weight:800;
      color:var(--rw-teal);
      margin-bottom:10px;
    }

    .sub-item{
      padding:8px 10px;
      border:1px solid var(--border);
      border-radius:10px;
      margin-bottom:8px;
      background:#fafbfc;
    }

    .sub-label{
      font-size:12px;
      text-transform:uppercase;
      color:var(--rw-gray);
      font-weight:700;
      margin-bottom:4px;
    }

    .sub-value{
      font-size:16px;
      font-weight:700;
      color:#111827;
    }

    .raw-box{
      margin-top:16px;
      background:#fff8db;
      border:2px solid #f0c64b;
      border-radius:12px;
      padding:12px;
    }

    .raw-box pre{
      margin:0;
      white-space:pre-wrap;
      word-break:break-word;
      font-family:Consolas, monospace;
      font-size:13px;
    }

    .hidden{
      display:none;
    }

    .empty{
      color:var(--rw-gray);
      font-style:italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>QR Scanner v9.5</h1>
    <div class="sub">Tilpasset QR-kode Generator v7.2 PRO</div>

    <div class="panel">
      <div id="reader"></div>

      <div class="btnrow">
        <button class="primary" onclick="startScanner()">Start scanning</button>
        <button class="secondary" onclick="resetScanner()">Ny scanning</button>
      </div>

      <div id="status" class="status">Klar til scanning</div>
    </div>

    <div class="panel">
      <div id="results" class="result-wrap">
        <div class="empty">Ingen data scannet endnu.</div>
      </div>

      <div id="rawDataBox" class="raw-box hidden">
        <strong>Rå QR-data</strong>
        <pre id="rawDataText"></pre>
      </div>
    </div>
  </div>

  <script>
    let html5QrCode = null;
    let scannerRunning = false;

    function setStatus(msg, color){
      const el = document.getElementById('status');
      el.textContent = msg;
      el.style.color = color || '#208684';
    }

    async function startScanner(){
      try{
        if(scannerRunning) return;

        document.getElementById('results').innerHTML = '<div class="empty">Scanner aktiv... vent på QR-kode.</div>';
        setStatus('Starter kamera...', '#208684');

        html5QrCode = new Html5Qrcode("reader");

        const config = {
          fps: 10,
          qrbox: { width: 250, height: 250 },
          aspectRatio: 1.0
        };

        await html5QrCode.start(
          { facingMode: "environment" },
          config,
          onScanSuccess,
          onScanFailure
        );

        scannerRunning = true;
        setStatus('Scanner kører — hold QR-koden foran kameraet', '#208684');
      }catch(err){
        console.error(err);
        setStatus('Kunne ikke starte kamera: ' + err, '#9F000F');
      }
    }

    function onScanFailure(error){
      // Ignorer løbende scan-fejl
    }

    async function onScanSuccess(decodedText){
      if(!scannerRunning) return;

      setStatus('QR-kode læst — stopper kamera...', '#208684');

      try{
        await stopScanner();
      }catch(e){
        console.warn('Stopfejl:', e);
      }

      document.getElementById('rawDataText').textContent = decodedText;
      document.getElementById('rawDataBox').classList.remove('hidden');

      const parsed = parseGeneratorQR(decodedText);
      renderParsedData(parsed);

      setStatus('Scan gennemført', '#208684');
    }

    async function stopScanner(){
      if(html5QrCode && scannerRunning){
        await html5QrCode.stop();
        await html5QrCode.clear();
        scannerRunning = false;
      }
    }

    async function resetScanner(){
      try{
        if(scannerRunning){
          await stopScanner();
        }
      }catch(e){
        console.warn(e);
      }

      document.getElementById('reader').innerHTML = '';
      document.getElementById('results').innerHTML = '<div class="empty">Ingen data scannet endnu.</div>';
      document.getElementById('rawDataText').textContent = '';
      document.getElementById('rawDataBox').classList.add('hidden');
      setStatus('Klar til ny scanning', '#208684');
    }

    function parseGeneratorQR(text){
      const lines = text.split(/\r?\n/);

      const data = {
        område: '',
        varenummer: '',
        materiale: '',
        antal: '',
        mål: {
          længde: '',
          bredde: '',
          tykkelse: '',
          vægt: ''
        },
        meter: '',
        areal: '',
        andenInfo: '',
        lagerplads: {
          lagerområde: '',
          reol: '',
          hylde: '',
          plads: ''
        },
        kemi: ''
      };

      let currentSection = '';

      for(let rawLine of lines){
        const line = rawLine.replace(/\t/g, '    ');
        const trimmed = line.trim();

        if(!trimmed) continue;

        if(trimmed === 'Mål:'){
          currentSection = 'mål';
          continue;
        }

        if(trimmed === 'Lagerplads:'){
          currentSection = 'lagerplads';
          continue;
        }

        if(currentSection === 'mål' && /^\s+/.test(line)){
          if(trimmed.startsWith('Længde:')){
            data.mål.længde = trimmed.replace(/^Længde:\s*/, '').trim();
            continue;
          }
          if(trimmed.startsWith('Bredde:')){
            data.mål.bredde = trimmed.replace(/^Bredde:\s*/, '').trim();
            continue;
          }
          if(trimmed.startsWith('Tykkelse:')){
            data.mål.tykkelse = trimmed.replace(/^Tykkelse:\s*/, '').trim();
            continue;
          }
          if(trimmed.startsWith('Vægt:')){
            data.mål.vægt = trimmed.replace(/^Vægt:\s*/, '').trim();
            continue;
          }
        }

        if(currentSection === 'lagerplads' && /^\s+/.test(line)){
          if(trimmed.startsWith('Lager/Område:')){
            data.lagerplads.lagerområde = trimmed.replace(/^Lager\/Område:\s*/, '').trim();
            continue;
          }
          if(trimmed.startsWith('Reol:')){
            data.lagerplads.reol = trimmed.replace(/^Reol:\s*/, '').trim();
            continue;
          }
          if(trimmed.startsWith('Hylde:')){
            data.lagerplads.hylde = trimmed.replace(/^Hylde:\s*/, '').trim();
            continue;
          }
          if(trimmed.startsWith('Plads:')){
            data.lagerplads.plads = trimmed.replace(/^Plads:\s*/, '').trim();
            continue;
          }
        }

        currentSection = '';

        if(trimmed.startsWith('Område:')){
          data.område = trimmed.replace(/^Område:\s*/, '').trim();
          continue;
        }

        if(trimmed.startsWith('Varenummer:')){
          data.varenummer = trimmed.replace(/^Varenummer:\s*/, '').trim();
          continue;
        }

        if(trimmed.startsWith('Materiale:')){
          data.materiale = trimmed.replace(/^Materiale:\s*/, '').trim();
          continue;
        }

        if(trimmed.startsWith('Antal:')){
          data.antal = trimmed.replace(/^Antal:\s*/, '').trim();
          continue;
        }

        if(trimmed.startsWith('Længde i meter:')){
          data.meter = trimmed.replace(/^Længde i meter:\s*/, '').trim();
          continue;
        }

        if(trimmed.startsWith('Areal i m²:')){
          data.areal = trimmed.replace(/^Areal i m²:\s*/, '').trim();
          continue;
        }

        if(trimmed.startsWith('Anden info:')){
          data.andenInfo = trimmed.replace(/^Anden info:\s*/, '').trim();
          continue;
        }

        if(trimmed.startsWith('Kemi:')){
          data.kemi = trimmed.replace(/^Kemi:\s*/, '').trim();
          continue;
        }
      }

      return data;
    }

    function createFieldBox(title, value){
      return `
        <div class="field-box">
          <div class="field-title">${escapeHtml(title)}</div>
          <div class="field-value">${escapeHtml(value)}</div>
        </div>
      `;
    }

    function createGroupBox(title, items){
      const validItems = items.filter(item => item.value && item.value.trim() !== '');
      if(validItems.length === 0) return '';

      return `
        <div class="group-box">
          <div class="group-title">${escapeHtml(title)}</div>
          ${validItems.map(item => `
            <div class="sub-item">
              <div class="sub-label">${escapeHtml(item.label)}</div>
              <div class="sub-value">${escapeHtml(item.value)}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderParsedData(data){
      const results = document.getElementById('results');
      let html = '';

      if(data.område) html += createFieldBox('Område', data.område);
      if(data.varenummer) html += createFieldBox('Varenummer', data.varenummer);
      if(data.materiale) html += createFieldBox('Materiale', data.materiale);
      if(data.antal) html += createFieldBox('Antal', data.antal);

      html += createGroupBox('Mål', [
        { label: 'Længde', value: data.mål.længde },
        { label: 'Bredde', value: data.mål.bredde },
        { label: 'Tykkelse', value: data.mål.tykkelse },
        { label: 'Vægt', value: data.mål.vægt }
      ]);

      if(data.meter) html += createFieldBox('Meter', data.meter);
      if(data.areal) html += createFieldBox('Areal', data.areal);
      if(data.andenInfo) html += createFieldBox('Anden info', data.andenInfo);

      html += createGroupBox('Lagerplads', [
        { label: 'Lager/Område', value: data.lagerplads.lagerområde },
        { label: 'Reol', value: data.lagerplads.reol },
        { label: 'Hylde', value: data.lagerplads.hylde },
        { label: 'Plads', value: data.lagerplads.plads }
      ]);

      if(data.kemi) html += createFieldBox('Kemi', data.kemi);

      if(!html){
        html = '<div class="empty">QR-koden blev læst, men ingen genkendelige lagerfelter blev fundet.</div>';
      }

      results.innerHTML = html;
    }

    function escapeHtml(str){
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
