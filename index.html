<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Info Scan — v10.3</title>
<style>
  :root{
    --rw-red:#D20014;
    --text:#111827;
    --black:#000;
    --un:#b91c1c;
    --green:#059669;
    --yellow:#CA8A04;
    --red:#B91C1C;
  }
  body{ margin:0; padding:12px; font-family: Arial, ui-monospace, monospace; background:var(--rw-red); color:var(--text); }
  .topbar{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:10px; }
  .topTitle{ color:#fff; font-weight:900; font-size:20px; }
  .logo{ height:70px; width:auto; display:block; }
  .card{ background:#fff; border-radius:12px; padding:14px; margin-bottom:14px; }
  #cameraWrap{ height:260px; border-radius:10px; background:#f3f4f6; display:flex; align-items:center; justify-content:center; color:#9ca3af; overflow:hidden; position:relative; }
  #cameraWrap video{ width:100%; height:100%; object-fit:cover; transform:none !important; -webkit-transform:none !important; }
  #reader{ width:100%; height:100%; }
  #reader video{ object-fit:cover !important; }
  #reader__scan_region{ background:transparent !important; }
  #reader__dashboard{ display:none !important; }
  #reader__header_message{ display:none !important; }
  #reader img[alt="Info icon"]{ display:none !important; }
  #reader__dashboard_section_csr, #reader__dashboard_section_fsr{ display:none !important; }
  .btn{ width:100%; height:56px; margin-top:14px; border-radius:10px; border:0; background:#0f172a; color:#fff; font-weight:900; font-size:18px; cursor:pointer; }
  .box{ border:2px solid var(--black); border-radius:6px; padding:10px 12px; margin-bottom:12px; background:white; }
  .catTitle{ font-size:17px; font-weight:900; margin-bottom:8px; }
  .boxValue{ font-family: ui-monospace, monospace; font-size:16px; white-space:pre-wrap; }
  .w-green{ color:var(--green); font-weight:900; }
  .w-yellow{ color:var(--yellow); font-weight:900; }
  .w-red{ color:var(--red); font-weight:900; }
  .kemiRow{ display:flex; justify-content:space-between; align-items:center; }
  .hazard{ width:34px; height:34px; }
  #copyBtn{ width:100%; height:50px; margin-top:12px; border-radius:10px; border:2px solid #ddd; background:white; font-weight:900; font-size:16px; cursor:pointer; }
  @media (max-width:700px){ .logo{ height:56px; } .topTitle{ font-size:18px; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topTitle">Info Scan — v10.3</div>
  <img class="logo" src="logo.png" alt="ROCKWOOL logo" onerror="this.style.display='none'"/>
</div>

<div class="card">
  <div style="font-weight:700;margin-bottom:8px;">Scanner</div>
  <div id="cameraWrap">
    <div id="reader"></div>
  </div>
  <button id="scanBtn" class="btn">NY SCANNING</button>
</div>

<div class="card" style="position:relative;">
  <div style="font-weight:700;margin-bottom:10px;font-size:18px;">Rådata</div>
  <div id="output"></div>
  <button id="copyBtn" disabled>KOPIER</button>
</div>

<script>
const scanBtn = document.getElementById('scanBtn');
const output  = document.getElementById('output');
const copyBtn = document.getElementById('copyBtn');
const cameraWrap = document.getElementById('cameraWrap');

let html5QrCode = null;
let scanning = false;

function esc(s){ return String(s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
function classifyWeight(kg){
  if(kg <= 15) return {cls:'w-green', extra:''};
  if(kg <= 30) return {cls:'w-yellow', extra:' (Pas på når du løfter)'};
  return {cls:'w-red', extra:' (Brug hjælpe værktøj til løft)'};
}
function enableCopy(enable){ copyBtn.disabled = !enable; }
function clearOutput(){ output.innerHTML = ''; enableCopy(false); }

function parseRaw(raw){
  const lines = String(raw||"").split(/\r?\n/).map(l=>l.trim()).filter(l=>l);
  const data = {};
  let collecting=false;
  let andenArr=[];
  const known = ['Område','Varenummer','Operatør','Antal','Længde','Bredde','Tykkelse','Vægt',
                 'Længde i meter','Meter','Areal i m²','Anden info','Lagerplads','Lager/Område','Reol','Hylde','Plads','Kemi'];
  for(let i=0;i<lines.length;i++){
    const line = lines[i];
    if(/^Anden info/i.test(line)){
      collecting = true;
      const parts=line.split(':');
      if(parts.length>1) andenArr.push(parts.slice(1).join(':').trim());
      continue;
    }
    if(collecting){
      if(/^[A-Za-zÆØÅæøå].*?:/.test(line)){
        const maybeKey = line.split(':')[0].trim();
        if(known.includes(maybeKey)){ collecting = false; i--; continue; }
      }
      andenArr.push(line);
      continue;
    }
    if(line.includes(':')){
      const parts=line.split(':');
      const key = parts[0].trim();
      const value = parts.slice(1).join(':').trim();
      if(key === 'Længde i meter'){
        data['Meter'] = value;
      } else {
        data[key] = value;
      }
    } else {
      const lastKey = Object.keys(data).slice(-1)[0];
      if(lastKey){ data[lastKey] = (data[lastKey] + '\n' + line).trim(); }
      else { data['_extra'] = (data['_extra'] ? data['_extra'] + '\n' : '') + line; }
    }
  }
  if(andenArr.length) data['Anden info'] = andenArr.join('\n');
  return data;
}

function makeBox(title, valueHtml){
  const d = document.createElement('div');
  d.className = 'box';
  d.innerHTML = `<div class="catTitle">${esc(title)}</div><div class="boxValue">${valueHtml}</div>`;
  return d;
}
function makeKemiBox(title, valueHtml, showHazard){
  const d = document.createElement('div');
  d.className = 'box';
  d.innerHTML = `<div class="catTitle">${esc(title)}</div>
    <div class="kemiRow">
      <div class="boxValue">${valueHtml}</div>
      ${showHazard? `<svg class="hazard" viewBox="0 0 400 400">
        <polygon points="200,20 380,200 200,380 20,200" fill="white" stroke="#d32f2f" stroke-width="35"/>
        <circle cx="200" cy="270" r="35" fill="black"/>
        <rect x="182" y="90" width="36" height="140" rx="18" fill="black"/>
      </svg>` : ''}
    </div>`;
  return d;
}

function renderData(data){
  clearOutput();
  const boxes = [
    {title:'Område', keys:['Område']},
    {title:'Varenummer', keys:['Varenummer']},
    {title:'Operatør', keys:['Operatør']},
    {title:'Antal', keys:['Antal']},
    {title:'Mål', keys:['Længde','Bredde','Tykkelse']},
    {title:'Vægt', keys:['Vægt']},
    {title:'Meter', keys:['Meter']},
    {title:'Areal i m²', keys:['Areal i m²']},
    {title:'Anden info', keys:['Anden info']},
    {title:'Lagerplads', keys:['Lagerplads','Lager/Område','Reol','Hylde','Plads']},
    {title:'Kemi', keys:['Kemi']}
  ];

  let unFound = false;
  Object.values(data).forEach(v => { if(/\bUN\d+/.test(v)) unFound = true; });

  boxes.forEach(box => {
    const present = box.keys.filter(k => (k in data) && String(data[k]).trim() !== '');
    if(!present.length) return;

    if(box.title === 'Mål'){
      const arr = [];
      ['Længde','Bredde','Tykkelse'].forEach(k => {
        if(k in data){
          let val = esc(data[k]);
          if(k === 'Tykkelse') val = val.replace(/mm/g, 'my');
          arr.push(`${k}: ${val}`);
        }
      });
      output.appendChild(makeBox(box.title, arr.join('\n')));
      return;
    }

    if(box.title === 'Vægt'){
      const raw = data['Vægt'] ? String(data['Vægt']).trim() : '';
      const m = raw.match(/([\d\.,]+)/);
      let kg = null;
      if(m) kg = parseFloat(m[1].replace(',','.'));
      let cls = '', txt = esc(raw);
      if(kg !== null && !isNaN(kg)){
        const inf = classifyWeight(kg);
        cls = inf.cls;
        txt = `${kg} kg${inf.extra}`;
      }
      output.appendChild(makeBox(box.title, `<span class="${cls}">${txt}</span>`));
      return;
    }

    if(box.title === 'Anden info'){
      output.appendChild(makeBox(box.title, esc(data['Anden info'] || '')));
      return;
    }

    if(box.title === 'Lagerplads'){
      const arr = [];
      ['Lagerplads','Lager/Område','Reol','Hylde','Plads'].forEach((k, i) => {
        if(k in data){
          if(i===0) return;
          arr.push(`${k}: ${esc(data[k])}`);
        }
      });
      output.appendChild(makeBox(box.title, arr.join('\n')));
      return;
    }

    if(box.title === 'Kemi'){
      const v = esc(data['Kemi'] || '');
      output.appendChild(makeKemiBox('Kemi', v, unFound || /\bUN\d+/.test(v)));
      return;
    }

    const key = present[0];
    output.appendChild(makeBox(box.title, esc(data[key])));
  });

  enableCopy(true);
}

copyBtn.addEventListener('click', async () => {
  try{
    await navigator.clipboard.writeText(output.innerText || '');
    const prev = copyBtn.textContent;
    copyBtn.textContent = 'KOPIERET';
    setTimeout(()=>copyBtn.textContent = prev,700);
  }catch(e){}
});

function loadLib(){
  return new Promise(res=>{
    if(window.Html5Qrcode) return res();
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
    s.onload = res;
    s.onerror = ()=>{ console.warn('html5-qrcode load failed'); res(); };
    document.head.appendChild(s);
  });
}

function isIOS(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
         (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

function isSamsung(){
  return /SamsungBrowser|SM-|Galaxy|Android/i.test(navigator.userAgent);
}

async function applyBestFocus(){
  try{
    const video = cameraWrap.querySelector('video');
    if(!video || !video.srcObject) return;

    const stream = video.srcObject;
    const track = stream.getVideoTracks && stream.getVideoTracks()[0];
    if(!track) return;

    const caps = track.getCapabilities ? track.getCapabilities() : {};
    const settings = track.getSettings ? track.getSettings() : {};
    console.log('Camera capabilities:', caps);
    console.log('Camera settings:', settings);

    const advanced = [];

    if(caps.focusMode && Array.isArray(caps.focusMode)){
      if(caps.focusMode.includes('continuous')) advanced.push({ focusMode: 'continuous' });
      else if(caps.focusMode.includes('single-shot')) advanced.push({ focusMode: 'single-shot' });
      else if(caps.focusMode.includes('auto')) advanced.push({ focusMode: 'auto' });
    }

    if('sharpness' in caps && typeof caps.sharpness === 'object'){
      advanced.push({ sharpness: caps.sharpness.max });
    }

    const constraints = {
      advanced
    };

    if(advanced.length){
      await track.applyConstraints(constraints);
      console.log('Applied focus constraints:', constraints);
    }
  }catch(e){
    console.warn('applyBestFocus failed:', e);
  }
}

async function stopCamera(){
  if(html5QrCode){
    try{ await html5QrCode.stop(); }catch(e){}
  }
  scanning = false;
  cameraWrap.innerHTML = '<div id="reader"></div>';
}

async function startScanning(){
  clearOutput();

  if(!window.Html5Qrcode){
    const demo=`Område: Demo
Varenummer: 12345
Operatør: John Doe
Antal: 2 KS
Længde: 1000 mm
Bredde: 600 mm
Tykkelse: 10 mm
Vægt: 18 kg
Længde i meter: 5 M
Areal i m²: 2 m²
Anden info: Test linje1
Test linje2
Lager/Område: sym01
Reol: 01
Hylde: 02
Plads: 03
Kemi: UN1209`;
    renderData(parseRaw(demo));
    return;
  }

  await stopCamera();

  let rd = document.getElementById('reader');
  if(!rd){
    cameraWrap.innerHTML = '<div id="reader"></div>';
    rd = document.getElementById('reader');
  }

  html5QrCode = new Html5Qrcode("reader");

  const onSuccess = async (decodedText) => {
    if(!scanning) return;
    scanning = false;
    try{ await html5QrCode.stop(); }catch(e){}
    cameraWrap.innerHTML = '<div id="reader"></div>';
    renderData(parseRaw(decodedText));
  };

  const onError = () => {};

  let cameraId = null;
  let devices = [];

  try{
    devices = await Html5Qrcode.getCameras();
    if(devices && devices.length){
      const preferred = devices.find(d => /back|rear|environment|bag|wide/i.test(d.label));
      cameraId = preferred ? preferred.id : devices[devices.length - 1].id;
    }
  }catch(e){
    console.warn('getCameras failed:', e);
  }

  const mobileConfig = {
    fps: isIOS() ? 8 : 10,
    qrbox: { width: 240, height: 240 },
    rememberLastUsedCamera: true,
    supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA],
    formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ]
  };

  const cameraModes = [];

  if(cameraId) cameraModes.push(cameraId);
  cameraModes.push({
    facingMode: { ideal: "environment" },
    width: { ideal: isIOS() ? 640 : 1280 },
    height: { ideal: isIOS() ? 480 : 720 }
  });
  cameraModes.push({
    facingMode: "environment"
  });

  for(const mode of cameraModes){
    try{
      await html5QrCode.start(mode, mobileConfig, onSuccess, onError);
      scanning = true;

      setTimeout(async ()=>{ await applyBestFocus(); }, 500);
      setTimeout(async ()=>{ await applyBestFocus(); }, 1500);

      return;
    }catch(err){
      console.warn('Scanner mode failed:', mode, err);
      try{ await html5QrCode.stop(); }catch(e){}
    }
  }

  cameraWrap.innerHTML = 'Kan ikke starte kamera';
}

scanBtn.addEventListener('click', async ()=>{
  cameraWrap.innerHTML = '<div id="reader">Starter kamera…</div>';
  await loadLib();
  await startScanning();
});

window.addEventListener('beforeunload', async ()=>{
  if(html5QrCode){
    try{ await html5QrCode.stop(); }catch(e){}
  }
});
</script>
</body>
</html>
