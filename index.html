<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Info Scan v11.4</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Courier New', monospace;
    background: #D20014;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 10px 10px 10px;
  }

  /* ===== HEADER ===== */
  .header {
    width: 100%;
    max-width: 500px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    margin-bottom: 10px;
  }
  .header-logo {
    height: 44px;
  }
  .header-title {
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 1.3em;
    font-weight: bold;
    text-align: right;
    line-height: 1.3;
  }

  /* ===== CAMERA ===== */
  #camera-wrapper {
    width: 100%;
    max-width: 500px;
    background: #eee;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 15px;
    position: relative;
    min-height: 280px;
  }
  #camera-container {
    width: 100%;
    min-height: 280px;
  }
  .off-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #999;
    font-size: 1.1em;
    pointer-events: none;
  }

  /* ===== BUTTONS ===== */
  .btn {
    width: 100%;
    max-width: 500px;
    padding: 14px;
    font-family: 'Courier New', monospace;
    font-size: 1.1em;
    font-weight: bold;
    border: 3px solid #000;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 12px;
    text-align: center;
  }
  .btn-scan { background: #fff; color: #000; }
  .btn-copy { background: #fff; color: #D20014; border-color: #D20014; }
  .btn-copy:active { background: #D20014; color: #fff; }

  /* ===== RESULT CARDS ===== */
  #results {
    width: 100%;
    max-width: 500px;
    display: none;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }
  .card {
    background: #fff;
    border: 2px solid #000;
    border-radius: 10px;
    padding: 14px 16px;
  }
  .card-title { font-weight: bold; font-size: 1.05em; margin-bottom: 6px; }
  .card-value { font-size: 1.0em; white-space: pre-wrap; word-break: break-word; }
  .card-value.heavy { color: #D20014; font-weight: bold; font-size: 1.15em; }
  .card-value.hazard { color: #D20014; font-weight: bold; font-size: 1.1em; }

  /* ===== FOOTER ===== */
  .footer-link {
    margin-top: auto;
    padding: 12px 24px;
    background: #D20014;
    color: #fff;
    border-radius: 20px;
    font-family: 'Courier New', monospace;
    font-size: 0.8em;
    text-decoration: none;
    margin-bottom: 10px;
  }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 10px 24px;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    display: none;
    z-index: 999;
  }
</style>
</head>
<body>

<!-- ===== HEADER: Logo left, title right ===== -->
<div class="header">
  <img class="header-logo" src="logo.png" alt="ROCKWOOL">
  <div class="header-title">Info Scan —<br>v11.4</div>
</div>

<div id="camera-wrapper">
  <div id="camera-container"></div>
  <span class="off-label" id="cam-off-label">Kamera er slukket</span>
</div>

<button class="btn btn-scan" id="scanBtn" onclick="toggleScan()">NY SCANNING</button>

<div id="results"></div>

<button class="btn btn-copy" id="copyBtn" style="display:none;" onclick="copyResults()">KOPIER</button>

<div class="toast" id="toast">Kopieret ✓</div>

<a class="footer-link" href="https://ch-tech2.github.io" target="_blank">ch-tech2.github.io</a>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
/* ===== ABBREVIATION MAP ===== */
const ABBREV_MAP = {
  'O':  'Område',
  'VN': 'Varenummer',
  'MA': 'Materiale',
  'OP': 'Operatør',
  'A':  'Antal',
  'L':  'Længde',
  'B':  'Bredde',
  'T':  'Tykkelse',
  'V':  'Vægt',
  'M':  'Længde i meter',
  'A2': 'Areal i m²',
  'AI': 'Anden info',
  'LO': 'Lager/Område',
  'RE': 'Reol',
  'HY': 'Hylde',
  'PL': 'Plads',
  'KE': 'Kemi'
};

const HIDDEN_FIELDS = ['Materiale'];
const FULL_KEYS = Object.values(ABBREV_MAP);
const ABBREV_KEYS_SORTED = Object.keys(ABBREV_MAP).sort((a, b) => b.length - a.length);

function parseCompact(raw) {
  const data = {};
  const parts = raw.split('|');
  if (parts.length > 1) {
    for (const part of parts) {
      const trimmed = part.trim();
      let matched = false;
      for (const key of ABBREV_KEYS_SORTED) {
        if (trimmed.startsWith(key + ':')) {
          data[ABBREV_MAP[key]] = trimmed.substring(key.length + 1).trim();
          matched = true;
          break;
        }
      }
      if (!matched) {
        for (const fk of FULL_KEYS) {
          if (trimmed.startsWith(fk + ':')) {
            data[fk] = trimmed.substring(fk.length + 1).trim();
            break;
          }
        }
      }
    }
  }
  return data;
}

function parseNewline(raw) {
  const data = {};
  const lines = raw.split('\n');
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    let matched = false;
    for (const key of ABBREV_KEYS_SORTED) {
      if (trimmed.startsWith(key + ':')) {
        data[ABBREV_MAP[key]] = trimmed.substring(key.length + 1).trim();
        matched = true;
        break;
      }
    }
    if (!matched) {
      for (const fk of FULL_KEYS) {
        if (trimmed.toLowerCase().startsWith(fk.toLowerCase() + ':')) {
          data[fk] = trimmed.substring(fk.length + 1).trim();
          break;
        }
      }
    }
  }
  return data;
}

function parseRaw(raw) {
  let data = parseCompact(raw);
  if (Object.keys(data).length >= 2) return data;

  data = parseNewline(raw);
  if (Object.keys(data).length >= 2) return data;

  data = {};
  const regexParts = ABBREV_KEYS_SORTED.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const pattern = new RegExp('(' + regexParts.join('|') + '):', 'g');
  const matches = [...raw.matchAll(pattern)];
  for (let i = 0; i < matches.length; i++) {
    const key = matches[i][1];
    const start = matches[i].index + matches[i][0].length;
    const end = (i + 1 < matches.length) ? matches[i + 1].index : raw.length;
    data[ABBREV_MAP[key]] = raw.substring(start, end).replace(/\|/g, '').trim();
  }
  return data;
}

/* ===== RENDER RESULTS ===== */
function renderResults(data) {
  const container = document.getElementById('results');
  container.innerHTML = '';
  container.style.display = 'flex';

  const HEAVY_THRESHOLD = 25;

  const displayConfig = [
    { key: 'Område', title: 'Område' },
    { key: 'Varenummer', title: 'Varenummer' },
    { key: 'Operatør', title: 'Operatør' },
    {
      key: 'Antal', title: 'Antal', format: (v) => {
        if (v.match(/PL|pPL|RULL|stk/i)) return v;
        return v + ' på PL';
      }
    },
    {
      key: '_maal_', title: 'Mål', multi: true,
      build: () => {
        const parts = [];
        if (data['Længde']) parts.push('Længde: ' + data['Længde'] + (data['Længde'].match(/mm|m/) ? '' : ' mm'));
        if (data['Bredde']) parts.push('Bredde: ' + data['Bredde'] + (data['Bredde'].match(/mm|m/) ? '' : ' mm'));
        if (data['Tykkelse']) parts.push('Tykkelse: ' + data['Tykkelse'] + (data['Tykkelse'].match(/mm|m/) ? '' : ' mm'));
        if (data['Længde i meter']) parts.push('Længde i meter: ' + data['Længde i meter'] + ' m');
        if (data['Areal i m²']) parts.push('Areal: ' + data['Areal i m²'] + ' m²');
        return parts.join('\n');
      }
    },
    {
      key: 'Vægt', title: 'Vægt', format: (v) => {
        const num = parseFloat(v);
        if (!isNaN(num) && num > HEAVY_THRESHOLD) {
          return { text: num + ' kg (Brug hjælpe værktøj til løft)', heavy: true };
        }
        return v + ' kg';
      }
    },
    { key: 'Anden info', title: 'Anden info' },
    {
      key: '_lager_', title: 'Lagerplads', multi: true,
      build: () => {
        const parts = [];
        if (data['Lager/Område']) parts.push('Lager/Område: ' + data['Lager/Område']);
        if (data['Reol']) parts.push('Reol: ' + data['Reol']);
        if (data['Hylde']) parts.push('Hylde: ' + data['Hylde']);
        if (data['Plads']) parts.push('Plads: ' + data['Plads']);
        return parts.join('\n');
      }
    },
    {
      key: 'Kemi', title: 'Kemi / Farligt stof', format: (v) => {
        const val = v.trim();
        const unMatch = val.match(/^(UN?\s*)?(\d{4})$/i);
        if (unMatch) {
          return { text: '⚠️ UN' + unMatch[2] + ' — Farligt stof', hazard: true };
        }
        return val;
      }
    }
  ];

  let copyText = '';

  for (const cfg of displayConfig) {
    let value = null;
    let isHeavy = false;
    let isHazard = false;

    if (cfg.multi && cfg.build) {
      value = cfg.build();
      if (!value) continue;
    } else {
      if (!data[cfg.key]) continue;
      if (HIDDEN_FIELDS.includes(cfg.key)) continue;
      let raw = data[cfg.key];
      if (cfg.format) {
        const result = cfg.format(raw);
        if (typeof result === 'object') {
          value = result.text;
          isHeavy = result.heavy || false;
          isHazard = result.hazard || false;
        } else {
          value = result;
        }
      } else {
        value = raw;
      }
    }

    const card = document.createElement('div');
    card.className = 'card';
    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = cfg.title;
    const val = document.createElement('div');
    val.className = 'card-value';
    if (isHeavy) val.classList.add('heavy');
    if (isHazard) val.classList.add('hazard');
    val.textContent = value;
    card.appendChild(title);
    card.appendChild(val);
    container.appendChild(card);
    copyText += cfg.title + ': ' + value + '\n';
  }

  window._copyText = copyText;
  document.getElementById('copyBtn').style.display = 'block';
}

/* ===== QR SCANNING ===== */
let scanner = null;
let scanning = false;

function toggleScan() {
  if (scanning) { stopScan(); } else { startScan(); }
}

function resetCameraContainer() {
  const wrapper = document.getElementById('camera-wrapper');
  const oldContainer = document.getElementById('camera-container');
  if (oldContainer) oldContainer.remove();
  const newContainer = document.createElement('div');
  newContainer.id = 'camera-container';
  newContainer.style.width = '100%';
  newContainer.style.minHeight = '280px';
  wrapper.insertBefore(newContainer, wrapper.firstChild);
}

function startScan() {
  resetCameraContainer();
  const camLabel = document.getElementById('cam-off-label');
  camLabel.style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  document.getElementById('copyBtn').style.display = 'none';
  document.getElementById('scanBtn').textContent = 'STOP SCANNING';

  scanner = new Html5Qrcode('camera-container');
  scanning = true;

  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    (decodedText) => { stopScan(); processQR(decodedText); },
    (errorMessage) => {}
  ).catch(err => {
    console.error('Camera error:', err);
    camLabel.textContent = 'Kan ikke åbne kamera';
    camLabel.style.display = 'block';
    scanning = false;
    document.getElementById('scanBtn').textContent = 'NY SCANNING';
  });
}

function stopScan() {
  if (scanner && scanning) {
    scanning = false;
    scanner.stop().then(() => {
      try { scanner.clear(); } catch(e) {}
      scanner = null;
      document.getElementById('scanBtn').textContent = 'NY SCANNING';
      document.getElementById('cam-off-label').style.display = 'block';
    }).catch(err => {
      console.error('Stop error:', err);
      scanner = null;
      document.getElementById('scanBtn').textContent = 'NY SCANNING';
      document.getElementById('cam-off-label').style.display = 'block';
    });
  }
}

function processQR(raw) {
  const data = parseRaw(raw);
  if (Object.keys(data).length > 0) {
    renderResults(data);
  } else {
    const container = document.getElementById('results');
    container.innerHTML = '';
    container.style.display = 'flex';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<div class="card-title">Rå data</div><div class="card-value">' +
      raw.replace(/</g, '&lt;') + '</div>';
    container.appendChild(card);
    window._copyText = raw;
    document.getElementById('copyBtn').style.display = 'block';
  }
}

/* ===== COPY ===== */
function copyResults() {
  if (window._copyText) {
    navigator.clipboard.writeText(window._copyText).then(() => {
      showToast();
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = window._copyText;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast();
    });
  }
}

function showToast() {
  const t = document.getElementById('toast');
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 1500);
}
</script>
</body>
</html>
