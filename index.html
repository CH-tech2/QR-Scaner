<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Info Scan v11.6</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Courier New', Courier, monospace;
    background: #1a1a1a; color: #f0f0f0;
    min-height: 100vh; padding: 10px;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    background: #D20014; padding: 12px 16px; border-radius: 10px;
    margin-bottom: 12px;
  }
  .header h1 { font-size: 1.3rem; color: #fff; }
  .header img { height: 40px; }
  #scanner-container {
    width: 100%; max-width: 400px; margin: 0 auto 12px;
    border-radius: 10px; overflow: hidden;
    border: 2px solid #D20014;
  }
  .btn {
    display: block; width: 100%; max-width: 400px; margin: 0 auto 10px;
    padding: 14px; font-size: 1.1rem; font-family: inherit;
    border: none; border-radius: 10px; cursor: pointer;
    font-weight: bold; color: #fff;
  }
  .btn-scan { background: #D20014; }
  .btn-scan:active { background: #9F000F; }
  .btn-copy { background: #208684; }
  .btn-copy:active { background: #186462; }
  #results { max-width: 400px; margin: 0 auto; }
  .card {
    background: #2a2a2a; border-left: 4px solid #D20014;
    border-radius: 8px; padding: 12px 14px; margin-bottom: 8px;
  }
  .card-label {
    font-size: 0.75rem; color: #D20014; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 4px;
  }
  .card-value { font-size: 1rem; color: #f0f0f0; word-break: break-word; }
  .card-hazard {
    background: #4a1a00; border-left-color: #ff6600;
  }
  .card-hazard .card-label { color: #ff6600; }
  .hazard-icon { font-size: 1.4rem; margin-right: 6px; }
  .card-weight-warn {
    background: #4a0000; border-left-color: #ff0000;
  }
  .card-weight-warn .card-label { color: #ff0000; }
  .group-title {
    font-size: 0.7rem; color: #888; text-transform: uppercase;
    letter-spacing: 1px; margin: 14px 0 4px 4px;
  }
  .status-msg {
    text-align: center; color: #888; font-size: 0.9rem;
    margin: 20px 0;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Info Scan v11.6</h1>
  <img src="https://ch-tech2.github.io/logo.png" alt="ROCKWOOL" onerror="this.style.display='none'">
</div>

<div id="scanner-container">
  <div id="reader"></div>
</div>

<button class="btn btn-scan" id="scanBtn" onclick="startScan()">📷 Start Scanner</button>
<button class="btn btn-copy" id="copyBtn" onclick="copyResults()" style="display:none;">📋 Kopiér Resultater</button>

<div id="results"></div>

<script>
/* ===================================================================
   INFO SCAN v11.6 — iPhone Fokus Fix
   Design uændret — kun logik
   =================================================================== */

/* ——— Forkortelsesmap (17 stk) ——— */
const ABBREV_MAP = {
  'O':  'Område',
  'VN': 'Varenummer',
  'MA': 'Materiale',
  'OP': 'Operatør',
  'A':  'Antal',
  'L':  'Længde',
  'B':  'Bredde',
  'T':  'Tykkelse',
  'V':  'Vægt',
  'M':  'Meter',
  'A2': 'Areal',
  'AI': 'Anden info',
  'LO': 'Lager/Område',
  'RE': 'Reol',
  'HY': 'Hylde',
  'PL': 'Plads',
  'KE': 'Kemi'
};

const FULL_NAMES    = Object.values(ABBREV_MAP);
const HIDDEN_FIELDS = ['Materiale'];
const MEASURE_FIELDS  = ['Længde', 'Bredde', 'Tykkelse', 'Meter', 'Areal'];
const LOCATION_FIELDS = ['Lager/Område', 'Reol', 'Hylde', 'Plads'];

/* Longest-first sorteret nøgler */
const ABBREV_KEYS  = Object.keys(ABBREV_MAP).sort((a, b) => b.length - a.length);
const ABBREV_REGEX = new RegExp('^(' + ABBREV_KEYS.join('|') + '):(.*)', 'i');

let html5QrCode = null;
let lastResults  = {};
let scanning     = false;

/* ——— Reset scanner DOM (fix rescan-crash) ——— */
function resetCameraContainer() {
  const container = document.getElementById('scanner-container');
  const oldReader = document.getElementById('reader');
  if (oldReader) oldReader.remove();
  const newReader = document.createElement('div');
  newReader.id = 'reader';
  container.appendChild(newReader);
  html5QrCode = null;
}

/* ——— Parse rå QR-data ——— */
function parseRaw(raw) {
  const data = {};
  const parts = raw.includes('|') ? raw.split('|') : raw.split('\n');

  for (let part of parts) {
    part = part.trim();
    if (!part) continue;

    /* Kompakt forkortelse først */
    const abbrevMatch = part.match(ABBREV_REGEX);
    if (abbrevMatch) {
      const key = abbrevMatch[1].toUpperCase();
      const mapKey = ABBREV_KEYS.find(k => k.toUpperCase() === key);
      if (mapKey) {
        data[ABBREV_MAP[mapKey]] = abbrevMatch[2].trim();
        continue;
      }
    }

    /* Fallback: fuldt navn (gammelt format) */
    const colonIdx = part.indexOf(':');
    if (colonIdx > 0) {
      const rawKey = part.substring(0, colonIdx).trim();
      const val    = part.substring(colonIdx + 1).trim();
      const match  = FULL_NAMES.find(n => n.toLowerCase() === rawKey.toLowerCase());
      if (match) data[match] = val;
    }
  }
  return data;
}

/* ——— Render resultater ——— */
function renderResults(data) {
  const el      = document.getElementById('results');
  const copyBtn = document.getElementById('copyBtn');

  if (!data || Object.keys(data).length === 0) {
    el.innerHTML = '<p class="status-msg">Ingen data fundet i QR-koden.</p>';
    copyBtn.style.display = 'none';
    return;
  }

  lastResults = data;
  let html = '';

  /* Individuelle felter */
  for (const [key, val] of Object.entries(data)) {
    if (HIDDEN_FIELDS.includes(key))  continue;
    if (MEASURE_FIELDS.includes(key)) continue;
    if (LOCATION_FIELDS.includes(key)) continue;

    /* Kemi → hazard-kort */
    if (key === 'Kemi') {
      const hasUN = /UN\d+/i.test(val);
      html += `<div class="card card-hazard">
        <div class="card-label"><span class="hazard-icon">⚠️</span>${key}</div>
        <div class="card-value">${val}${hasUN ? ' — Farligt stof (EU-klassificering)' : ''}</div>
      </div>`;
      continue;
    }

    /* Vægt → 25 kg check */
    if (key === 'Vægt') {
      const num   = parseFloat(val);
      const heavy = !isNaN(num) && num > 25;
      html += `<div class="card ${heavy ? 'card-weight-warn' : ''}">
        <div class="card-label">${key}</div>
        <div class="card-value">${val}${val.toLowerCase().includes('kg') ? '' : ' kg'}${heavy ? '<br><strong>⚠️ Brug hjælpe værktøj til løft</strong>' : ''}</div>
      </div>`;
      continue;
    }

    /* Standard kort */
    html += `<div class="card">
      <div class="card-label">${key}</div>
      <div class="card-value">${val}</div>
    </div>`;
  }

  /* Mål-boks */
  const measureEntries = MEASURE_FIELDS.filter(f => data[f]);
  if (measureEntries.length > 0) {
    html += '<div class="group-title">📐 Mål</div><div class="card">';
    for (const f of measureEntries) {
      html += `<div class="card-label" style="margin-top:6px">${f}</div>
               <div class="card-value">${data[f]}</div>`;
    }
    html += '</div>';
  }

  /* Lager-boks */
  const locEntries = LOCATION_FIELDS.filter(f => data[f]);
  if (locEntries.length > 0) {
    html += '<div class="group-title">📦 Lagerplacering</div><div class="card">';
    for (const f of locEntries) {
      html += `<div class="card-label" style="margin-top:6px">${f}</div>
               <div class="card-value">${data[f]}</div>`;
    }
    html += '</div>';
  }

  el.innerHTML = html;
  copyBtn.style.display = 'block';
}

/* ——— Start scanner ——— */
async function startScan() {
  const btn = document.getElementById('scanBtn');

  /* Stop hvis allerede kører */
  if (scanning && html5QrCode) {
    try { await html5QrCode.stop(); } catch(e) {}
    resetCameraContainer();
    btn.textContent = '📷 Start Scanner';
    scanning = false;
    return;
  }

  resetCameraContainer();
  document.getElementById('results').innerHTML = '<p class="status-msg">Scanner...</p>';
  document.getElementById('copyBtn').style.display = 'none';
  btn.textContent = '⏹ Stop Scanner';
  scanning = true;

  html5QrCode = new Html5Qrcode("reader");

  const config = {
    fps: 10,
    qrbox: { width: 250, height: 250 },
    aspectRatio: 1.0,
    experimentalFeatures: {
      useBarCodeDetectorIfSupported: true
    }
  };

  try {
    await html5QrCode.start(
      { facingMode: "environment" },
      config,
      onScanSuccess,
      () => {} /* ignorer fejl-frames */
    );

    /* ——— v11.6: Post-start fokus-fix for iPhone ——— */
    applyFocusConstraints();

  } catch (err) {
    document.getElementById('results').innerHTML =
      `<p class="status-msg">Kamera-fejl: ${err}</p>`;
    btn.textContent = '📷 Start Scanner';
    scanning = false;
  }
}

/* ——— Tving kontinuerlig autofokus + nær-fokus ——— */
async function applyFocusConstraints() {
  try {
    const videoElem = document.querySelector('#reader video');
    if (!videoElem || !videoElem.srcObject) return;

    const track = videoElem.srcObject.getVideoTracks()[0];
    if (!track) return;

    const capabilities = track.getCapabilities ? track.getCapabilities() : {};
    const advConstraints = {};

    /* Kontinuerlig autofokus */
    if (capabilities.focusMode &&
        Array.isArray(capabilities.focusMode) &&
        capabilities.focusMode.includes('continuous')) {
      advConstraints.focusMode = 'continuous';
    }

    /* Nær fokus-afstand */
    if (capabilities.focusDistance &&
        typeof capabilities.focusDistance.min === 'number') {
      advConstraints.focusDistance = capabilities.focusDistance.min;
    }

    if (Object.keys(advConstraints).length > 0) {
      await track.applyConstraints({ advanced: [advConstraints] });
      console.log('[v11.6] Fokus-constraints applied:', advConstraints);
    } else {
      console.log('[v11.6] Ingen fokus-capabilities fundet — bruger standard');
    }
  } catch (e) {
    console.log('[v11.6] Fokus-constraints ikke understøttet:', e);
  }
}

/* ——— Scan succes ——— */
async function onScanSuccess(decodedText) {
  if (!scanning) return;
  scanning = false;

  /* Haptisk feedback */
  if (navigator.vibrate) navigator.vibrate(200);

  try { await html5QrCode.stop(); } catch(e) {}

  document.getElementById('scanBtn').textContent = '📷 Scan Igen';

  const data = parseRaw(decodedText);
  renderResults(data);
}

/* ——— Kopiér resultater (med fallback) ——— */
function copyResults() {
  if (!lastResults || Object.keys(lastResults).length === 0) return;

  let text = '';
  for (const [k, v] of Object.entries(lastResults)) {
    if (!HIDDEN_FIELDS.includes(k)) {
      text += `${k}: ${v}\n`;
    }
  }
  text = text.trim();

  const btn = document.getElementById('copyBtn');

  /* Clipboard API (kræver HTTPS) */
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✅ Kopieret!';
      setTimeout(() => btn.textContent = '📋 Kopiér Resultater', 2000);
    }).catch(() => fallbackCopy(text, btn));
  } else {
    fallbackCopy(text, btn);
  }
}

/* Fallback kopiering (HTTP / ældre browsere) */
function fallbackCopy(text, btn) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    btn.textContent = '✅ Kopieret!';
  } catch(e) {
    btn.textContent = '❌ Kopiering fejlede';
  }
  document.body.removeChild(ta);
  setTimeout(() => btn.textContent = '📋 Kopiér Resultater', 2000);
}
</script>

</body>
</html>
