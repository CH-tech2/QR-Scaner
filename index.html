<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Info Scan v11.2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Courier New', monospace;
    background: #D20014;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
  }
  h1 {
    color: #fff;
    font-size: 1.4em;
    margin: 10px 0;
    text-align: center;
  }
  .version {
    color: rgba(255,255,255,0.6);
    font-size: 0.7em;
  }
  #camera-container {
    width: 100%;
    max-width: 500px;
    background: #eee;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 15px;
    position: relative;
    aspect-ratio: 4/3;
  }
  #camera-container video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #camera-container .off-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #999;
    font-size: 1.1em;
  }
  .btn {
    width: 100%;
    max-width: 500px;
    padding: 14px;
    font-family: 'Courier New', monospace;
    font-size: 1.1em;
    font-weight: bold;
    border: 3px solid #000;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 12px;
    text-align: center;
  }
  .btn-scan {
    background: #fff;
    color: #000;
  }
  .btn-copy {
    background: #fff;
    color: #D20014;
    border-color: #D20014;
  }
  .btn-copy:active {
    background: #D20014;
    color: #fff;
  }

  /* Result cards */
  #results {
    width: 100%;
    max-width: 500px;
    display: none;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }
  .card {
    background: #fff;
    border: 2px solid #000;
    border-radius: 10px;
    padding: 14px 16px;
  }
  .card-title {
    font-weight: bold;
    font-size: 1.05em;
    margin-bottom: 6px;
  }
  .card-value {
    font-size: 1.0em;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .card-value.heavy {
    color: #D20014;
    font-weight: bold;
    font-size: 1.15em;
  }
  .card-value.hazard {
    color: #D20014;
    font-weight: bold;
    font-size: 1.1em;
  }

  /* Hazard icon */
  .hazard-icon {
    display: inline-block;
    width: 28px;
    height: 28px;
    vertical-align: middle;
    margin-right: 6px;
  }

  .footer-link {
    margin-top: auto;
    padding: 12px 24px;
    background: #D20014;
    color: #fff;
    border-radius: 20px;
    font-family: 'Courier New', monospace;
    font-size: 0.8em;
    text-decoration: none;
    margin-bottom: 10px;
  }

  /* Copy toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 10px 24px;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    display: none;
    z-index: 999;
  }
</style>
</head>
<body>

<h1>ROCKWOOL Info Scan <span class="version">v11.2</span></h1>

<div id="camera-container">
  <video id="video" playsinline></video>
  <span class="off-label" id="cam-off-label">Kamera er slukket</span>
</div>

<button class="btn btn-scan" id="scanBtn" onclick="toggleScan()">NY SCANNING</button>

<div id="results"></div>

<button class="btn btn-copy" id="copyBtn" style="display:none;" onclick="copyResults()">KOPIER</button>

<div class="toast" id="toast">Kopieret ✓</div>

<a class="footer-link" href="https://ch-tech2.github.io" target="_blank">ch-tech2.github.io</a>

<!-- QR Scanner library -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
/* ===== ABBREVIATION MAP ===== */
const ABBREV_MAP = {
  'O':  'Område',
  'VN': 'Varenummer',
  'MA': 'Materiale',
  'OP': 'Operatør',
  'A':  'Antal',
  'L':  'Længde',
  'B':  'Bredde',
  'T':  'Tykkelse',
  'V':  'Vægt',
  'M':  'Længde i meter',
  'A2': 'Areal i m²',
  'AI': 'Anden info',
  'LO': 'Lager/Område',
  'RE': 'Reol',
  'HY': 'Hylde',
  'PL': 'Plads',
  'KE': 'Kemi'
};

/* Full-name keys (for old format) */
const FULL_KEYS = [
  'Område', 'Varenummer', 'Materiale', 'Operatør', 'Antal',
  'Længde', 'Bredde', 'Tykkelse', 'Vægt', 'Længde i meter',
  'Areal i m²', 'Anden info', 'Lager/Område', 'Reol', 'Hylde',
  'Plads', 'Kemi'
];

/* Sort abbreviation keys longest-first to avoid partial matches */
const ABBREV_KEYS_SORTED = Object.keys(ABBREV_MAP).sort((a, b) => b.length - a.length);

/* Build regex for compact format: keys separated by | */
/* Pattern: capture KEY:VALUE pairs separated by | */
function parseCompact(raw) {
  const data = {};
  /* Try pipe-separated first */
  const parts = raw.split('|');
  if (parts.length > 1) {
    for (const part of parts) {
      const trimmed = part.trim();
      /* Match against known abbreviations */
      let matched = false;
      for (const key of ABBREV_KEYS_SORTED) {
        if (trimmed.startsWith(key + ':')) {
          const value = trimmed.substring(key.length + 1).trim();
          const fullName = ABBREV_MAP[key];
          data[fullName] = value;
          matched = true;
          break;
        }
      }
      /* Also try full-name keys */
      if (!matched) {
        for (const fk of FULL_KEYS) {
          if (trimmed.startsWith(fk + ':')) {
            const value = trimmed.substring(fk.length + 1).trim();
            data[fk] = value;
            break;
          }
        }
      }
    }
  }
  return data;
}

function parseNewline(raw) {
  const data = {};
  const lines = raw.split('\n');
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    /* Try abbreviations first (longest-first) */
    let matched = false;
    for (const key of ABBREV_KEYS_SORTED) {
      if (trimmed.startsWith(key + ':')) {
        const value = trimmed.substring(key.length + 1).trim();
        data[ABBREV_MAP[key]] = value;
        matched = true;
        break;
      }
    }
    if (!matched) {
      for (const fk of FULL_KEYS) {
        if (trimmed.toLowerCase().startsWith(fk.toLowerCase() + ':')) {
          const value = trimmed.substring(fk.length + 1).trim();
          data[fk] = value;
          break;
        }
      }
    }
  }
  return data;
}

function parseRaw(raw) {
  /* Try pipe-separated compact format first */
  let data = parseCompact(raw);
  if (Object.keys(data).length >= 2) return data;

  /* Try newline-separated */
  data = parseNewline(raw);
  if (Object.keys(data).length >= 2) return data;

  /* Fallback: try to parse as a single compact string without pipes
     (keys smashed together) using regex */
  data = {};
  const regexParts = ABBREV_KEYS_SORTED.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const pattern = new RegExp('(' + regexParts.join('|') + '):', 'g');
  const matches = [...raw.matchAll(pattern)];
  for (let i = 0; i < matches.length; i++) {
    const key = matches[i][1];
    const start = matches[i].index + matches[i][0].length;
    const end = (i + 1 < matches.length) ? matches[i + 1].index : raw.length;
    const value = raw.substring(start, end).replace(/\|/g, '').trim();
    data[ABBREV_MAP[key]] = value;
  }
  return data;
}

/* ===== RENDER RESULTS ===== */
function renderResults(data) {
  const container = document.getElementById('results');
  container.innerHTML = '';
  container.style.display = 'flex';

  const HEAVY_THRESHOLD = 25; /* kg — show warning above this */

  /* Define display order and grouping */
  const displayConfig = [
    { key: 'Område', title: 'Område' },
    { key: 'Varenummer', title: 'Varenummer' },
    { key: 'Materiale', title: 'Materiale' },
    { key: 'Operatør', title: 'Operatør' },
    { key: 'Antal', title: 'Antal', format: (v) => v + ' på PL' },
    {
      key: '_maal_', title: 'Mål', multi: true,
      build: () => {
        const parts = [];
        if (data['Længde']) parts.push('Længde: ' + data['Længde'] + (data['Længde'].match(/mm|m/) ? '' : ' mm'));
        if (data['Bredde']) parts.push('Bredde: ' + data['Bredde'] + (data['Bredde'].match(/mm|m/) ? '' : ' mm'));
        if (data['Tykkelse']) parts.push('Tykkelse: ' + data['Tykkelse'] + (data['Tykkelse'].match(/mm|m/) ? '' : ' mm'));
        if (data['Længde i meter']) parts.push('Længde i meter: ' + data['Længde i meter'] + ' m');
        if (data['Areal i m²']) parts.push('Areal: ' + data['Areal i m²'] + ' m²');
        return parts.join('\n');
      }
    },
    {
      key: 'Vægt', title: 'Vægt', format: (v) => {
        const num = parseFloat(v);
        if (!isNaN(num) && num > HEAVY_THRESHOLD) {
          return { text: num + ' kg (Brug hjælpe værktøj til løft)', heavy: true };
        }
        return v + ' kg';
      }
    },
    { key: 'Anden info', title: 'Anden info' },
    {
      key: '_lager_', title: 'Lagerplads', multi: true,
      build: () => {
        const parts = [];
        if (data['Lager/Område']) parts.push('Lager/Område: ' + data['Lager/Område']);
        if (data['Reol']) parts.push('Reol: ' + data['Reol']);
        if (data['Hylde']) parts.push('Hylde: ' + data['Hylde']);
        if (data['Plads']) parts.push('Plads: ' + data['Plads']);
        /* If only Plads exists without LO, show it standalone */
        if (parts.length === 0 && data['Plads']) parts.push('Plads: ' + data['Plads']);
        return parts.join('\n');
      }
    },
    {
      key: 'Kemi', title: 'Kemi / Farligt stof', format: (v) => {
        const val = v.trim();
        /* Check if UN-number */
        const unMatch = val.match(/^(UN?\s*)?(\d{4})$/i);
        if (unMatch) {
          return { text: '⚠️ UN' + unMatch[2] + ' — Farligt stof', hazard: true };
        }
        return val;
      }
    }
  ];

  let copyText = '';

  for (const cfg of displayConfig) {
    let value = null;
    let isHeavy = false;
    let isHazard = false;

    if (cfg.multi && cfg.build) {
      value = cfg.build();
      if (!value) continue;
    } else {
      if (!data[cfg.key]) continue;
      let raw = data[cfg.key];

      if (cfg.format) {
        const result = cfg.format(raw);
        if (typeof result === 'object') {
          value = result.text;
          isHeavy = result.heavy || false;
          isHazard = result.hazard || false;
        } else {
          value = result;
        }
      } else {
        value = raw;
      }
    }

    /* Skip "Antal" format suffix if value already contains descriptive text */
    if (cfg.key === 'Antal') {
      const rawAntal = data['Antal'];
      /* If the value already has descriptive text like "8 RULL/PL", don't add "på PL" */
      if (rawAntal.match(/PL|pPL|RULL|stk/i)) {
        value = rawAntal;
      }
    }

    const card = document.createElement('div');
    card.className = 'card';

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = cfg.title;

    const val = document.createElement('div');
    val.className = 'card-value';
    if (isHeavy) val.classList.add('heavy');
    if (isHazard) val.classList.add('hazard');
    val.textContent = value;

    card.appendChild(title);
    card.appendChild(val);
    container.appendChild(card);

    copyText += cfg.title + ': ' + value + '\n';
  }

  window._copyText = copyText;
  document.getElementById('copyBtn').style.display = 'block';
}

/* ===== QR SCANNING ===== */
let scanner = null;
let scanning = false;

function toggleScan() {
  if (scanning) {
    stopScan();
  } else {
    startScan();
  }
}

function startScan() {
  const camLabel = document.getElementById('cam-off-label');
  camLabel.style.display = 'none';

  document.getElementById('results').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  document.getElementById('copyBtn').style.display = 'none';
  document.getElementById('scanBtn').textContent = 'STOP SCANNING';

  scanner = new Html5Qrcode('camera-container');
  scanning = true;

  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    (decodedText) => {
      /* Success */
      stopScan();
      processQR(decodedText);
    },
    (errorMessage) => {
      /* Ignore scan errors */
    }
  ).catch(err => {
    console.error('Camera error:', err);
    camLabel.textContent = 'Kan ikke åbne kamera';
    camLabel.style.display = 'block';
    scanning = false;
    document.getElementById('scanBtn').textContent = 'NY SCANNING';
  });
}

function stopScan() {
  if (scanner) {
    scanner.stop().then(() => {
      scanner.clear();
      scanning = false;
      document.getElementById('scanBtn').textContent = 'NY SCANNING';
      document.getElementById('cam-off-label').style.display = 'block';
    }).catch(err => {
      console.error('Stop error:', err);
      scanning = false;
      document.getElementById('scanBtn').textContent = 'NY SCANNING';
    });
  }
}

function processQR(raw) {
  const data = parseRaw(raw);
  if (Object.keys(data).length > 0) {
    renderResults(data);
  } else {
    /* Fallback: show raw data if parsing fails */
    const container = document.getElementById('results');
    container.innerHTML = '';
    container.style.display = 'flex';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<div class="card-title">Rå data</div><div class="card-value">' +
      raw.replace(/</g, '&lt;') + '</div>';
    container.appendChild(card);
    window._copyText = raw;
    document.getElementById('copyBtn').style.display = 'block';
  }
}

/* ===== COPY ===== */
function copyResults() {
  if (window._copyText) {
    navigator.clipboard.writeText(window._copyText).then(() => {
      showToast();
    }).catch(() => {
      /* Fallback */
      const ta = document.createElement('textarea');
      ta.value = window._copyText;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast();
    });
  }
}

function showToast() {
  const t = document.getElementById('toast');
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 1500);
}
</script>
</body>
</html>
